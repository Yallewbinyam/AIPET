# =============================================================
# AIPET Cloud — Nginx Configuration
# =============================================================
# What is Nginx?
# Nginx sits in front of Gunicorn and handles:
#   1. HTTPS encryption (SSL)
#   2. Serving static files fast
#   3. Load balancing
#   4. DDoS protection
#   5. Caching
#
# Think of Nginx as the security guard at the front door.
# Gunicorn is the team working inside.
# =============================================================

server {
    listen 80;
    server_name aipet.io www.aipet.io;

    # Redirect all HTTP to HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl;
    server_name aipet.io www.aipet.io;

    # SSL Certificate (from Let's Encrypt)
    ssl_certificate     /etc/letsencrypt/live/aipet.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/aipet.io/privkey.pem;

    # SSL Security Settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES256-GCM-SHA512:DHE-RSA-AES256-GCM-SHA512;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000" always;

    # File upload limit (for firmware files)
    client_max_body_size 100M;

    # Timeouts
    proxy_read_timeout 300;
    proxy_connect_timeout 300;
    proxy_send_timeout 300;

    # API requests — forward to Gunicorn
    location /api/ {
        proxy_pass         http://127.0.0.1:5001\;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # React frontend — serve static files
    location / {
        root /home/binyam/AIPET/dashboard/frontend/aipet-dashboard/build;
        try_files $uri $uri/ /index.html;
        expires 1d;
        add_header Cache-Control "public, immutable";
    }

    # Health check endpoint — no auth required
    location /health {
        proxy_pass http://127.0.0.1:5001/api/health\;
    }

    # Logging
    access_log /var/log/nginx/aipet_access.log;
    error_log  /var/log/nginx/aipet_error.log;
}
