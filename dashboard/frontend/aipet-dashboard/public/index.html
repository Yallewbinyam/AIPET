<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <meta name="theme-color" content="#00e5ff" />
    <meta name="background-color" content="#030712" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="AIPET X" />
    <meta name="application-name" content="AIPET X" />
    <meta name="description" content="AI-Powered IoT Security Platform — Scan, Monitor, Protect your IoT devices" />
    <meta name="keywords" content="IoT security, cybersecurity, AIPET, vulnerability scanning, SIEM" />
    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />
    <!-- Apple touch icons -->
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-152.png" />
    <link rel="apple-touch-icon" sizes="144x144" href="/icons/icon-144.png" />
    <link rel="apple-touch-icon" sizes="128x128" href="/icons/icon-128.png" />
    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/icon-96.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/icons/icon-72.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    
    <!-- Primary Meta Tags -->
    <title>AIPET X — AI-Powered IoT Security Platform</title>
    <meta name="title" content="AIPET X | AI-Powered IoT Security Platform" />
    <meta name="description" content="AIPET automates IoT security scanning, explains vulnerabilities with AI, quantifies financial risk, and generates NIS2, NIST CSF 2.0, and ISO 27001 compliance reports — in 60 seconds." />
    <meta name="keywords" content="IoT security, NIS2 compliance, NIST CSF, ISO 27001, vulnerability scanning, AI security, explainable AI, SHAP, penetration testing" />
    <meta name="author" content="Binyam Yallew, Coventry University" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph / LinkedIn / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://aipet.io/" />
    <meta property="og:title" content="AIPET X | AI-Powered IoT Security Platform" />
    <meta property="og:description" content="Find exactly how a hacker would attack your IoT devices — before they do. AI-powered scanning, explainable results, NIS2 compliance. Free forever." />
    <meta property="og:image" content="https://aipet.io/og-image.png" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://aipet.io/" />
    <meta property="twitter:title" content="AIPET X | AI-Powered IoT Security Platform" />
    <meta property="twitter:description" content="Find exactly how a hacker would attack your IoT devices — before they do. AI-powered scanning, explainable results, NIS2 compliance. Free forever." />
    <meta property="twitter:image" content="https://aipet.io/og-image.png" />

    <!-- Theme -->
    <meta name="theme-color" content="#00e5ff" />
    <meta name="msapplication-TileColor" content="#030712" />

    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body>
    <div id="root"></div>
    <script>
    // Register AIPET X Service Worker
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .then(reg => {
            console.log('[AIPET] Service Worker registered:', reg.scope);
          })
          .catch(err => {
            console.log('[AIPET] SW registration failed:', err);
          });
      });
    }
  </script>
</body>
</html>
