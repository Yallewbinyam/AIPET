# =============================================================
# AIPET Cloud — Docker Compose
# =============================================================
# What this file does:
#   Defines all 6 containers and how they connect.
#   One command starts everything:
#     docker-compose up -d
#
# Containers:
#   postgres:        Database — stores users, scans, findings
#   redis:           Message queue — for background scan jobs
#   aipet-api:       Flask + Gunicorn — the main API
#   aipet-worker:    Celery worker — runs scans in background
#   aipet-frontend:  React dashboard — served by Nginx
#   nginx:           Reverse proxy — HTTPS termination
# =============================================================

version: "3.9"

services:

  # ── PostgreSQL Database ─────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: aipet-postgres
    restart: always
    environment:
      POSTGRES_DB:       aipet_cloud
      POSTGRES_USER:     aipet
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aipet_secure_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aipet -d aipet_cloud"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis Message Queue ─────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: aipet-redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD:-aipet_redis_password}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── AIPET API (Flask + Gunicorn) ────────────────────────────
  aipet-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aipet-api
    restart: always
    environment:
      FLASK_ENV:      production
      DATABASE_URL:   postgresql://aipet:${POSTGRES_PASSWORD:-aipet_secure_password}@postgres:5432/aipet_cloud
      REDIS_URL:      redis://:${REDIS_PASSWORD:-aipet_redis_password}@redis:6379/0
      SECRET_KEY:     ${SECRET_KEY:-change-this-in-production}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-this-jwt-in-production}
    volumes:
      - scan_results:/app/results
      - scan_reports:/app/reporting
      - ai_models:/app/ai_engine/models
    ports:
      - "5001:5001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── AIPET Worker (Celery) ───────────────────────────────────
  aipet-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aipet-worker
    restart: always
    command: celery -A dashboard.backend.tasks worker --loglevel=info
    environment:
      FLASK_ENV:    production
      DATABASE_URL: postgresql://aipet:${POSTGRES_PASSWORD:-aipet_secure_password}@postgres:5432/aipet_cloud
      REDIS_URL:    redis://:${REDIS_PASSWORD:-aipet_redis_password}@redis:6379/0
      SECRET_KEY:   ${SECRET_KEY:-change-this-in-production}
    volumes:
      - scan_results:/app/results
      - scan_reports:/app/reporting
      - ai_models:/app/ai_engine/models
    depends_on:
      - aipet-api
      - redis
      - postgres

  # ── Nginx Reverse Proxy ─────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: aipet-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./dashboard/backend/nginx_aipet.conf:/etc/nginx/conf.d/default.conf:ro
      - ./dashboard/frontend/aipet-dashboard/build:/usr/share/nginx/html:ro
      - nginx_logs:/var/log/nginx
      - letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - aipet-api

# ── Volumes ─────────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  scan_results:
    driver: local
  scan_reports:
    driver: local
  ai_models:
    driver: local
  nginx_logs:
    driver: local
  letsencrypt:
    driver: local

# ── Networks ─────────────────────────────────────────────────
networks:
  default:
    name: aipet-network
    driver: bridge
